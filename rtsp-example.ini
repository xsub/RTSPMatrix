[rtsp]
host = <DVR IP>
port = 554
user = <DVR user: admin?>
password = <DVR pass>
path = /cam/realmonitor
subtype = 0
# Recommended for multi-tile setups: substream for tiles, mainstream for
# fullscreen.  Overrides `subtype` per context.
subtype_tile = 1
subtype_full = 0
# Hardware decode (VideoToolbox / DXVA2 / VAAPI).  Leave off if a
# camera/firmware combo deadlocks libVLC on software-to-hardware switch;
# safe default is 0 (hardware ON) for modern builds.
disable_hw_decode = 0
tcp = 1
network_caching_ms = 250
open_timeout_ms = 2500

[app]
title = RTSPMatrix
default_panes = 4
views_file = views.json
state_file = state.json
# Delay in ms between opening individual RTSP sessions during a batch
# (pane-count increase, view apply).  Staggering smooths the DVR + network
# load spike and reduces time-outs on "open all 16" scenarios.  Set to 0
# for the old behaviour (all at once).  100 is fine for a gigabit LAN
# DVR; bump to 300-500 for a slower DVR or lossy network.
;stagger_open_ms = 100

# Internal profiler.  When enabled, named timers / counters / gauges are
# collected and dumped to the log every profile_dump_interval_s seconds.
# Zero overhead while disabled.  Useful to diagnose slow fullscreen
# transitions, GUI-loop jitter, or which libVLC events are firing.
;profile = true
;profile_dump_interval_s = 10
