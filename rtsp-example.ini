[rtsp]
host = <DVR IP>
port = 554
user = <DVR user: admin?>
password = <DVR pass>
path = /cam/realmonitor
subtype = 0
# subtype_tile / subtype_full override `subtype` per context.  Set
# subtype_tile=1 to feed every grid tile from the substream — typically
# 1/4 the bandwidth and 1/4 the decode cost vs. mainstream.  Default is
# whatever `subtype` is set to (i.e. unchanged behaviour).
;subtype_tile = 1
;subtype_full = 0
tcp = 1
network_caching_ms = 250
open_timeout_ms = 2500

[app]
title = RTSPMatrix
default_panes = 4
views_file = views.json
state_file = state.json
